name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-client:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24.x]   # test across multiple Node versions
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies (client)
        run: npm install

      - name: Build frontend
        run: npm run build

  build-server:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24.x]
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies (server)
        run: npm install

      - name: Run server tests
        run: npm test
